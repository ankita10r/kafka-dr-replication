plugins {
    id 'java'
    id 'application'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'com.dr'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

repositories {
    mavenCentral()
}

ext {
    kafkaVersion = '4.0.0'
    jacksonVersion = '2.17.1'
}

dependencies {
    implementation "org.apache.kafka:kafka-clients:${kafkaVersion}"
    implementation "com.fasterxml.jackson.core:jackson-databind:${jacksonVersion}"
    implementation 'org.slf4j:slf4j-simple:2.0.13'

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

application {
    mainClass = 'com.dr.producer.CommitLogProducer'
}

// Fat jar, matches the maven-shade output name so the Dockerfile stays simple
shadowJar {
    archiveBaseName.set('commit-log-producer')
    archiveClassifier.set('')
    archiveVersion.set('')
    mergeServiceFiles()
}

test {
    useJUnitPlatform()
}

// Tests must pass before we build the runnable artifact -- a red test should
// block the Docker image build, not get silently skipped.
shadowJar.dependsOn test
