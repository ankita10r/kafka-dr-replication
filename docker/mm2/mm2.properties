# MirrorMaker 2 dedicated-mode config (run via connect-mirror-maker.sh).
# Cluster aliases below ("primary", "standby") are what DefaultReplicationPolicy
# uses to prefix replicated topic names -> commit-log becomes primary.commit-log
# on the standby cluster. Bootstrap addresses use the internal PLAINTEXT listener
# (19092), not the host-mapped port (9092) -- this file runs inside the Docker network.

clusters = primary, standby

primary.bootstrap.servers = kafka-primary:19092
standby.bootstrap.servers = kafka-standby:19092

primary.security.protocol = PLAINTEXT
standby.security.protocol = PLAINTEXT

# Only replicate primary -> standby (this is a one-way DR pipeline, not bidirectional)
primary->standby.enabled = true
primary->standby.topics = commit-log

standby->primary.enabled = false

tasks.max = 1

# Single-node clusters -> replication factor 1 everywhere, including MM2's own
# internal topics (checkpoints, heartbeats, offset-syncs, configs/offsets/status).
replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1

# No ACLs configured on either cluster in this demo setup
sync.topic.acls.enabled = false

# Poll more frequently than the 60s retention window we set on commit-log,
# so normal replication is fast enough that the truncation test scenario
# (Task 2) has to deliberately pause MM2 to trigger a gap.
refresh.topics.interval.seconds = 10
