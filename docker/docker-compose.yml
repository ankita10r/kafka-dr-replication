name: kafka-dr

services:

  kafka-primary:
    image: apache/kafka:4.0.0
    hostname: kafka-primary
    container_name: kafka-primary
    ports:
      - "9092:9092"      # host access, e.g. from your own kafka-topics.sh
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-primary:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-primary:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Default retention check runs every 5 minutes -- too slow for a test loop.
      # Checking every 5s means a 60s retention.ms topic actually gets cleaned up
      # within roughly a minute of expiring, not five.
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 5000
      # Explicit topic creation only -- we want commit-log to carry a specific
      # retention.ms, not whatever the broker default would auto-create.
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka-primary-data:/var/lib/kafka/data

  kafka-standby:
    image: apache/kafka:4.0.0
    hostname: kafka-standby
    container_name: kafka-standby
    ports:
      - "9094:9092"      # host access on a different port than primary
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-standby:19092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-standby:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-standby-data:/var/lib/kafka/data

  # One-shot init: creates commit-log on the primary cluster with the exact
  # config the assignment specifies (1 partition, 1 replica, 60s retention).
  # MM2 auto-creates the mirrored primary.commit-log topic on the standby side
  # itself, so we don't need to pre-create that one.
  kafka-init:
    image: apache/kafka:4.0.0
    depends_on:
      - kafka-primary
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-primary:19092 > /dev/null 2>&1; do
          echo "waiting for kafka-primary..."; sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-primary:19092 \
          --create --if-not-exists --topic commit-log \
          --partitions 1 --replication-factor 1 \
          --config retention.ms=60000
        echo "commit-log topic ready."

  mm2:
    build:
      context: ..
      dockerfile: docker/mm2/Dockerfile
      args:
        KAFKA_FORK_URL: ${KAFKA_FORK_URL:-https://github.com/CHANGE-ME/kafka.git}
        KAFKA_FORK_BRANCH: ${KAFKA_FORK_BRANCH:-feature/mm2-fault-tolerance}
        CACHEBUST: ${CACHEBUST:-1}
    container_name: mm2
    ports:
      - "8083:8083"     # MM2's embedded Connect REST API -- check task status here
    depends_on:
      - kafka-primary
      - kafka-standby
      - kafka-init

  producer:
    build:
      context: ../producer
    container_name: commit-log-producer
    depends_on:
      - kafka-init
    command: ["--count", "100", "--bootstrap-servers", "kafka-primary:19092", "--topic", "commit-log"]
    # `profiles` genuinely excludes this service from `docker compose up` --
    # my earlier comment claiming this was already true was wrong; without a
    # profile, Compose starts every service defined in the file, including
    # this one, using the default `command` above. Run it deliberately with:
    #   docker compose run --rm producer --count N ...
    # or: docker compose --profile manual up producer
    profiles:
      - manual

volumes:
  kafka-primary-data:
  kafka-standby-data: